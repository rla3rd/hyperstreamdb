name: Documentation Site

on:
  push:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'python/**'
      - 'docs/**'
      - 'ROADMAP.md'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rust-docs

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r docs/requirements.txt

      - name: Build Rust API Documentation
        run: cargo doc --no-deps --features python,cuda,enterprise,java,mps,intel

      - name: Build Python Extension (for autodoc)
        run: |
          # Use maturin to build and pip install the package so autodoc can find it
          pip install maturin
          maturin build --release || maturin build --release --compatibility manylinux2014
          pip install target/wheels/*.whl

      - name: Prepare Sphinx Guides
        run: |
          # Copy existing markdown guides into source directory
          mkdir -p docs/source/guides/
          find docs -maxdepth 1 -name "*.md" -type f -exec cp {} docs/source/guides/ \;
          # Ensure filename matches index.rst expectation
          mv docs/source/guides/INSTALLATION.md docs/source/guides/installation.md || true
          mv docs/source/guides/COMPREHENSIVE_GUIDE.md docs/source/guides/comprehensive_guide.md || true
          mv docs/source/guides/PYTHON_VECTOR_API.md docs/source/guides/python_vector_api.md || true
          mv docs/source/guides/GPU_SETUP_GUIDE.md docs/source/guides/gpu_setup_guide.md || true
          mv docs/source/guides/CONFIGURATION.md docs/source/guides/configuration.md || true
          mv docs/source/guides/CONCURRENCY.md docs/source/guides/concurrency.md || true

      - name: Build Sphinx Documentation
        run: |
          sphinx-build -b html docs/source docs/build/html

      - name: Merge Rustdoc into Sphinx Build
        run: |
          mkdir -p docs/build/html/rust
          cp -r target/doc/* docs/build/html/rust/

      - name: Add CNAME
        run: echo "www.hyperstreamdb.org" > docs/build/html/CNAME

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs/build/html
          force_orphan: true
