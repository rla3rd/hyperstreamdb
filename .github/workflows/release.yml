name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

env:
  CARGO_TERM_COLOR: always
  # Reduce disk usage by disabling incremental compilation and heavy debug info
  CARGO_INCREMENTAL: 0
  CARGO_PROFILE_DEV_DEBUG: 0
  CARGO_PROFILE_TEST_DEBUG: 0

jobs:
  check:
    name: Run Tests
    runs-on: ubuntu-22.04
    steps:
      - name: Maximize build space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ocl-icd-opencl-dev
      - name: Install CUDA Toolkit
        uses: Jimver/cuda-toolkit@v0.2.30
        with:
          cuda: '12.1.0'
      - name: Prep CUDA Stubs
        run: |
          # The linker looks for libcuda.so.1, but stubs only provide libcuda.so
          sudo ln -sf /usr/local/cuda/lib64/stubs/libcuda.so /usr/local/cuda/lib64/stubs/libcuda.so.1
          echo "/usr/local/cuda/lib64/stubs" | sudo tee /etc/ld.so.conf.d/cuda-stubs.conf
          sudo ldconfig
      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Run Cargo Check
        run: cargo check --all-targets --all-features
      - name: Run Cargo Tests (CPU)
        run: cargo test --lib --tests
      - name: Run Cargo Tests (Features)
        # Note: GPU tests might skip on CI runners, but compilation is verified
        # Use --nocapture to see live progress and identify potential hangs
        timeout-minutes: 20
        env:
          # Point to CUDA stubs so binaries can load even without a GPU
          LD_LIBRARY_PATH: /usr/local/cuda/lib64/stubs:${{ env.LD_LIBRARY_PATH }}
        run: cargo test --features intel_gpu,cuda --all-targets -- --skip gpu_execution --nocapture

  linux:
    needs: [check]
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v4
      - name: Install CUDA Toolkit
        uses: Jimver/cuda-toolkit@v0.2.30
        id: cuda-toolkit
        with:
          cuda: '12.1.0'
          method: 'network'
          # We only need compilation, not the full driver
          sub-packages: '["nvcc", "cudart-dev"]'
      - name: Update version
        shell: bash
        run: |
          if [[ $GITHUB_REF == refs/tags/v* ]]; then
            export VERSION=${GITHUB_REF#refs/tags/v}
            echo "Bumping version to $VERSION"
            perl -i -pe '$done or s/^version = ".*"/version = "$ENV{VERSION}"/ and $done = 1' Cargo.toml pyproject.toml
          fi
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --find-interpreter --features intel_gpu,cuda
          sccache: 'true'
          manylinux: auto
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.target }}
          path: dist

  macos:
    needs: [check]
    runs-on: macos-latest
    strategy:
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v4
      - name: Update version
        shell: bash
        run: |
          if [[ $GITHUB_REF == refs/tags/v* ]]; then
            export VERSION=${GITHUB_REF#refs/tags/v}
            echo "Bumping version to $VERSION"
            perl -i -pe '$done or s/^version = ".*"/version = "$ENV{VERSION}"/ and $done = 1' Cargo.toml pyproject.toml
          fi
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --find-interpreter --features mps
          sccache: 'true'
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-${{ matrix.target }}
          path: dist

  sdist:
    needs: [check]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Update version
        shell: bash
        run: |
          if [[ $GITHUB_REF == refs/tags/v* ]]; then
            export VERSION=${GITHUB_REF#refs/tags/v}
            echo "Bumping version to $VERSION"
            perl -i -pe '$done or s/^version = ".*"/version = "$ENV{VERSION}"/ and $done = 1' Cargo.toml pyproject.toml
          fi
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: dist

  release:
    name: Final Release
    runs-on: ubuntu-latest
    if: "startsWith(github.ref, 'refs/tags/')"
    needs: [linux, macos, sdist]
    environment: release_pypi
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
          verbose: true
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/*
          generate_release_notes: true
