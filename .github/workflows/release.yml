name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v4
      - name: Install CUDA Toolkit
        uses: Jimver/cuda-toolkit@v0.2.30
        id: cuda-toolkit
        with:
          cuda: '12.1.0'
          method: 'network'
          # We only need compilation, not the full driver
          sub-packages: '["nvcc", "cudart-dev"]'
      - name: Update version
        shell: bash
        run: |
          if [[ $GITHUB_REF == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
            echo "Bumping version to $VERSION"
            python3 - <<EOF
          import re
          for f in ['Cargo.toml', 'pyproject.toml']:
              with open(f, 'r') as fh:
                  content = fh.read()
              content = re.sub(r'^version = ".*"', f'version = "{VERSION}"', content, count=1, flags=re.M)
              with open(f, 'w') as fh:
                  fh.write(content)
          EOF
          fi
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --find-interpreter --features intel_gpu,cuda
          sccache: 'true'
          manylinux: auto
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.target }}
          path: dist

  macos:
    runs-on: macos-latest
    strategy:
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v4
      - name: Update version
        shell: bash
        run: |
          if [[ $GITHUB_REF == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
            echo "Bumping version to $VERSION"
            python3 - <<EOF
          import re
          for f in ['Cargo.toml', 'pyproject.toml']:
              with open(f, 'r') as fh:
                  content = fh.read()
              content = re.sub(r'^version = ".*"', f'version = "{VERSION}"', content, count=1, flags=re.M)
              with open(f, 'w') as fh:
                  fh.write(content)
          EOF
          fi
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --find-interpreter --features mps
          sccache: 'true'
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-${{ matrix.target }}
          path: dist

  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Update version
        shell: bash
        run: |
          if [[ $GITHUB_REF == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
            echo "Bumping version to $VERSION"
            python3 - <<EOF
          import re
          for f in ['Cargo.toml', 'pyproject.toml']:
              with open(f, 'r') as fh:
                  content = fh.read()
              content = re.sub(r'^version = ".*"', f'version = "{VERSION}"', content, count=1, flags=re.M)
              with open(f, 'w') as fh:
                  fh.write(content)
          EOF
          fi
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: dist

  release:
    name: Release
    runs-on: ubuntu-latest
    if: "startsWith(github.ref, 'refs/tags/')"
    needs: [linux, macos, sdist]
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
          verbose: true
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/*
          generate_release_notes: true
