name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

env:
  CARGO_TERM_COLOR: always
  # Reduce disk usage by disabling incremental compilation and heavy debug info
  CARGO_INCREMENTAL: 0
  CARGO_PROFILE_DEV_DEBUG: 0
  CARGO_PROFILE_TEST_DEBUG: 0
  # Opt into Node.js 24 for actions to avoid deprecation warnings (required by June 2026)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check:
    name: Run Tests
    runs-on: ubuntu-22.04
    steps:
      - name: Maximize build space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ocl-icd-opencl-dev
      - name: Install CUDA Toolkit
        uses: Jimver/cuda-toolkit@v0.2.30
        with:
          cuda: '12.1.0'
      - name: Prep CUDA Stubs
        run: |
          # The linker looks for libcuda.so.1, but stubs only provide libcuda.so
          sudo ln -sf /usr/local/cuda/lib64/stubs/libcuda.so /usr/local/cuda/lib64/stubs/libcuda.so.1
          echo "/usr/local/cuda/lib64/stubs" | sudo tee /etc/ld.so.conf.d/cuda-stubs.conf
          sudo ldconfig
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - 'src/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'vendor/**'
              - 'python/**'
              - 'pyproject.toml'
              - 'tests/**'
              - 'benches/**'
              - 'build.rs'

      - name: Cache Rust dependencies
        if: steps.filter.outputs.code == 'true'
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "check"

      - name: Run Cargo Check
        if: steps.filter.outputs.code == 'true'
        run: cargo check --all-targets --all-features

      - name: Run Cargo Tests (CPU)
        if: steps.filter.outputs.code == 'true'
        run: cargo test --lib --tests

      - name: Run Cargo Tests (Features)
        if: steps.filter.outputs.code == 'true'
        # Note: GPU tests might skip on CI runners, but compilation is verified
        # Use --nocapture to see live progress and identify potential hangs
        timeout-minutes: 20
        env:
          # Point to CUDA stubs so binaries can load even without a GPU
          LD_LIBRARY_PATH: /usr/local/cuda/lib64/stubs:${{ env.LD_LIBRARY_PATH }}
        run: cargo test --features intel_gpu,cuda --lib --tests -- --skip gpu_execution --nocapture

  linux:
    needs: [check]
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: true
      matrix:
        target: [x86_64]
    steps:
      - uses: actions/checkout@v4
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "linux-x86_64"
          cache-targets: false
      - name: Install CUDA Toolkit
        uses: Jimver/cuda-toolkit@v0.2.35
        id: cuda-toolkit
        with:
          cuda: '12.1.0'
          method: 'network'
          # We only need compilation, not the full driver
          sub-packages: '["nvcc", "cudart-dev"]'
      - name: Setup Zig
        uses: mlugg/setup-zig@v1
        with:
          version: 0.13.0
      - name: Update version from tag
        shell: bash
        run: |
          if [[ $GITHUB_REF == refs/tags/v* ]]; then
            export VERSION=${GITHUB_REF#refs/tags/v}
            export CARGO_VERSION=$(echo $VERSION | sed -E 's/([0-9]+\.[0-9]+\.[0-9]+)([a-zA-Z])/\1-\2/')
            echo "Bumping versions to $VERSION (Cargo: $CARGO_VERSION)"
            # Only replace the FIRST occurrence in each file
            perl -i -pe '$done or s/^version = \".*\"/version = \"$ENV{CARGO_VERSION}\"/ and $done = 1' Cargo.toml
            perl -i -pe '$done or s/^version = \".*\"/version = \"$ENV{VERSION}\"/ and $done = 1' pyproject.toml
          fi
      - name: Install OpenCL headers and ICD
        run: sudo apt-get update && sudo apt-get install -y ocl-icd-opencl-dev
      - name: Create cross-compilation stubs
        run: |
          # Create a platform-specific stub dir
          mkdir -p /tmp/stubs
          
          # We only build x86_64 now
          ZIG_TARGET="x86_64-linux-gnu.2.17"
          
          # 1. Create OpenCL stub (with more common symbols)
          echo 'void clGetPlatformIDs() {} void clGetDeviceIDs() {} void clCreateContext() {}' > /tmp/stubs/opencl_stub.c
          zig cc -target $ZIG_TARGET -shared -o /tmp/stubs/libOpenCL.so /tmp/stubs/opencl_stub.c
          ln -sf libOpenCL.so /tmp/stubs/libOpenCL.so.1
          
          # 2. Create CUDA stub
          echo 'void cuInit() {} void cuDeviceGet() {} void cuCtxCreate_v2() {}' > /tmp/stubs/cuda_stub.c
          zig cc -target $ZIG_TARGET -shared -o /tmp/stubs/libcuda.so /tmp/stubs/cuda_stub.c
          ln -sf libcuda.so /tmp/stubs/libcuda.so.1
          
          ls -la /tmp/stubs/
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        env:
          # Use our clean, architecture-correct stubs exclusively
          RUSTFLAGS: -L /tmp/stubs
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --find-interpreter --features intel_gpu,cuda --zig
          sccache: 'false'
          manylinux: auto
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.target }}
          path: dist

  macos:
    needs: [check]
    runs-on: macos-latest
    strategy:
      fail-fast: true
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v4
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "macos-${{ matrix.target }}"
          cache-targets: false
      - name: Update version from tag
        shell: bash
        run: |
          if [[ $GITHUB_REF == refs/tags/v* ]]; then
            export VERSION=${GITHUB_REF#refs/tags/v}
            export CARGO_VERSION=$(echo $VERSION | sed -E 's/([0-9]+\.[0-9]+\.[0-9]+)([a-zA-Z])/\1-\2/')
            echo "Bumping versions to $VERSION (Cargo: $CARGO_VERSION)"
            # Only replace the FIRST occurrence in each file
            perl -i -pe '$done or s/^version = \".*\"/version = \"$ENV{CARGO_VERSION}\"/ and $done = 1' Cargo.toml
            perl -i -pe '$done or s/^version = \".*\"/version = \"$ENV{VERSION}\"/ and $done = 1' pyproject.toml
          fi
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --find-interpreter --features mps
          sccache: 'false'
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-${{ matrix.target }}
          path: dist

  windows:
    needs: [check]
    runs-on: windows-latest
    strategy:
      fail-fast: true
      matrix:
        target: [x64]
    steps:
      - uses: actions/checkout@v4
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "windows-${{ matrix.target }}"
          cache-targets: false
      - name: Update version from tag
        shell: bash
        run: |
          if [[ $GITHUB_REF == refs/tags/v* ]]; then
            export VERSION=${GITHUB_REF#refs/tags/v}
            export CARGO_VERSION=$(echo $VERSION | sed -E 's/([0-9]+\.[0-9]+\.[0-9]+)([a-zA-Z])/\1-\2/')
            echo "Bumping versions to $VERSION (Cargo: $CARGO_VERSION)"
            # Only replace the FIRST occurrence in each file
            perl -i -pe '$done or s/^version = \".*\"/version = \"$ENV{CARGO_VERSION}\"/ and $done = 1' Cargo.toml
            perl -i -pe '$done or s/^version = \".*\"/version = \"$ENV{VERSION}\"/ and $done = 1' pyproject.toml
          fi
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --find-interpreter
          sccache: 'false'
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-${{ matrix.target }}
          path: dist

  sdist:
    needs: [check]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Update version from tag
        shell: bash
        run: |
          if [[ $GITHUB_REF == refs/tags/v* ]]; then
            export VERSION=${GITHUB_REF#refs/tags/v}
            export CARGO_VERSION=$(echo $VERSION | sed -E 's/([0-9]+\.[0-9]+\.[0-9]+)([a-zA-Z])/\1-\2/')
            echo "Bumping versions to $VERSION (Cargo: $CARGO_VERSION)"
            # Only replace the FIRST occurrence in each file
            perl -i -pe '$done or s/^version = \".*\"/version = \"$ENV{CARGO_VERSION}\"/ and $done = 1' Cargo.toml
            perl -i -pe '$done or s/^version = \".*\"/version = \"$ENV{VERSION}\"/ and $done = 1' pyproject.toml
          fi
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: dist


  release:
    name: Final Release
    runs-on: ubuntu-latest
    if: "startsWith(github.ref, 'refs/tags/')"
    needs: [linux, macos, windows, sdist]
    environment: release_pypi
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Update version from tag
        shell: bash
        run: |
          if [[ $GITHUB_REF == refs/tags/v* ]]; then
            export VERSION=${GITHUB_REF#refs/tags/v}
            export CARGO_VERSION=$(echo $VERSION | sed -E 's/([0-9]+\.[0-9]+\.[0-9]+)([a-zA-Z])/\1-\2/')
            echo "Bumping versions to $VERSION (Cargo: $CARGO_VERSION)"
            # Only replace the FIRST occurrence in each file
            perl -i -pe '$done or s/^version = \".*\"/version = \"$ENV{CARGO_VERSION}\"/ and $done = 1' Cargo.toml
            perl -i -pe '$done or s/^version = \".*\"/version = \"$ENV{VERSION}\"/ and $done = 1' pyproject.toml
          fi
      - name: Publish to crates.io
        run: cargo publish --token ${{ secrets.CARGO_REGISTRY_TOKEN }} --allow-dirty
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Download wheels
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
          verbose: true
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/*
          generate_release_notes: true
